[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zorkvdo-ai"
version = "0.1.0"
description = "ZorkVDO AI engine - Gemini + video analysis"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26.0",
    "opencv-python>=4.9.0",
    "ffmpeg-python>=0.2.0",
    "moviepy>=2.0.0",
    "librosa>=0.10.1",
    "soundfile>=0.12.1",
    "Pillow>=10.2.0",
    "pydantic>=2.6.0",
    "google-genai>=0.3.0",
    "structlog>=24.1.0",
]

[project.optional-dependencies]
ocr = ["easyocr>=1.7.0"]
yolo = ["ultralytics>=8.1.0"]
pose = ["mediapipe>=0.10.9"]
all = ["easyocr>=1.7.0", "ultralytics>=8.1.0", "mediapipe>=0.10.9"]

[tool.setuptools.packages.find]
where = ["."]
include = ["zorkvdo_ai*"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zorkvdo-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for the ZorkVDO Blueprint contract"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["zorkvdo_schemas*"]
